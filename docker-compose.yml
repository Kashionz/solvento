services:
  postgres:
    image: postgres:18
    container_name: cashpilot-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: cashpilot
      POSTGRES_USER: cashpilot
      POSTGRES_PASSWORD: cashpilot
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

